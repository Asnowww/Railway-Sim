services:
  mysql:
    image: mysql:8.4
    container_name: railway-sim-mysql
    environment:
      MYSQL_ROOT_PASSWORD: railway_root
      MYSQL_DATABASE: railway_sim
      MYSQL_USER: railway
      MYSQL_PASSWORD: railway_pass
    ports:
      - "3306:3306"
    volumes:
      - railway_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  railway_mysql_data:

