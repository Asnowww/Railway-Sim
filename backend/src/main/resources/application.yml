server:
  port: 8080

spring:
  application:
    name: railway-sim-backend
  task:
    scheduling:
      # еӨҡзәҝзЁӢи°ғеәҰжұ пјҡйҒҝе…Қи§ҶжҷҜ(100ms)гҖҒд»ҝзңҹtick(100ms)зӯү @Scheduled д»»еҠЎеңЁеҚ•зәҝзЁӢдёҠдёІиЎҢеҜјиҮҙе‘ЁжңҹжјӮз§»гҖӮ
      pool:
        size: 4
  config:
    import:
      - optional:file:./application-local.yml
      - optional:file:./config/application-local.yml
      - optional:file:../config/application-local.yml
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:railway_sim}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${DB_USER:railway_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  jackson:
    time-zone: Asia/Shanghai

railway:
  simulation:
    tick-millis: 100
    push-interval-millis: 1000
    default-line-length-meters: 5000
    default-speed-limit-meters-per-second: 22.2
    default-curve-radius-meters: 1000
    safety-gap-meters: 120
    line-data-source: file
    line-id: "1"
    line-data-auto-import: false
    line-data-path: ../config/line-m9.yaml
    power-config-path: ../config/power_third_rail.yaml
    fmu-step-millis: 100
    track-step-millis: 100
    signal-step-millis: 100
    power-step-millis: 100
    dispatch-step-millis: 1000
    persistence-step-millis: 5000
    stopping-control:
      service-brake-deceleration-meters-per-second-squared: 0.9
      station-stop-window-meters: 10.0
      minimum-approach-buffer-meters: 30.0
      maximum-approach-buffer-meters: 140.0
      approach-buffer-seconds: 6.0
      minimum-effective-deceleration-meters-per-second-squared: 0.35
      maximum-effective-deceleration-meters-per-second-squared: 1.25
      zero-speed-meters-per-second: 0.2
      stable-seconds: 2
      success-tolerance-meters: 1.0
      overrun-threshold-meters: 1.0
      parameter-version: STOPPING_V1
    recovery:
      stale-after-millis: 1000
      maximum-tick-lag: 1
    fmu-service-enabled: false
    fmu-service-url: http://localhost:9000
    fmu-service-timeout-millis: 500
    block-mode: MOVING
    driver-cab:
      # еҸҢжҺ§еҲ¶жәҗд»ІиЈҒпјҡFRONTEND=д»…еүҚз«ҜеҸёжңәеҸ°й©ұеҠЁ9300(е®һзү©PLCиҫ“е…Ҙд»…й•ңеғҸжҳҫзӨә)пјӣ
      # PHYSICAL=д»…е®һзү©PLCй©ұеҠЁ9300(еүҚз«Ҝд»…жҳҫзӨә)пјӣLAST_WINS=дёӨиҖ…йғҪдёӢеҸ‘,еҗҺеҲ°иҰҶзӣ–гҖӮ
      # иҒ”и°ғйҳ¶ж®өд»…жүӢеҠЁгҖҒеүҚз«Ҝдёәж“ҚдҪңеёӯпјҢй»ҳи®Ө FRONTENDгҖӮ
      control-source: FRONTEND
    vision:
      enabled: false
      train-id: TR-001
      target-host: 18.32.115.28
      target-port: 8302
      local-port: 0
      interval-millis: 100
    vehicle-runtime:
      mode: EXTERNAL_HTTP
      base-url: http://localhost:9300
      timeout-millis: 150
      auto-bootstrap: true
    external-power-network:
      mode: LOCAL
      base-url: http://localhost:9200
      timeout-millis: 300
      auto-bootstrap: true
    localnet:
      enabled: false
      audit-enabled: true
      recent-packet-limit: 20
      signal:
        enabled: false
        bind-host: 0.0.0.0
        bind-port: 0
        remote-host: 127.0.0.1
        remote-port: 0
        send-interval-millis: 100
        max-trains: 20
        shadow-comparison: true
      driver-cab:
        # жңәжҲҝеұҖеҹҹзҪ‘еҸёжңәеҸ° TCP йҖӮй…ҚпјҲй»ҳи®Өе…ій—ӯпјҢйҳІжӯўжҠўеҚ е…¶д»–з»„жӯЈеңЁеҚ з”Ёзҡ„зҺ°еңәжҺҘеҸЈпјүгҖӮ
        # дёҠзәҝжҺҘзәҝж—¶пјҡжҠҠ localnet.enabled дёҺжң¬иҠӮ enabled зҪ® trueпјҢе№¶еҸ–ж¶ҲдёӢж–№ connections жіЁйҮҠгҖӮ
        # зҺ°еңәйғЁзҪІпјҡPLC/зҪ‘з»ңеұҸ/дҝЎеҸ·еұҸеқҮдёә TCP жңҚеҠЎеҷЁпјҢжң¬жңҚеҠЎдҪңе®ўжҲ·з«ҜеӨ–иҝһгҖӮ
        #   PLC(8001)  йҖҡи®Ҝи®ҫеӨҮ 192.168.100.123 -> йғЁзҪІжңә 192.168.200.102пјҢдёҠиЎҢ 100ms 46B / дёӢиЎҢ 26B
        #   зҪ‘з»ңеұҸHMI(8888) 192.168.100.121пјҢеҚ•еҗ‘иҫ“еҮә 570B
        #   дҝЎеҸ·еұҸMMI(9999) 192.168.100.122пјҢеҚ•еҗ‘иҫ“еҮә 68B(еҢ…еӨҙ totalLen дҝқз•ҷ 62)
        enabled: false
        reconnect-millis: 1000
        connections: []
        # connections:
        #   - train-id: TR-001
        #     role: PLC
        #     host: 192.168.100.123
        #     port: 8001
        #     cycle-millis: 100
        #     timeout-millis: 300
        #   - train-id: TR-001
        #     role: NETWORK_SCREEN
        #     host: 192.168.100.121
        #     port: 8888
        #     cycle-millis: 200
        #     timeout-millis: 300
        #   - train-id: TR-001
        #     role: SIGNAL_SCREEN
        #     host: 192.168.100.122
        #     port: 9999
        #     cycle-millis: 200
        #     timeout-millis: 300
      power-points:
        enabled: false
        point-table-path: ../config/power-point-table-example.yaml
        driver: LOCAL_SIM
        http-base-url: http://localhost:9200
        poll-interval-millis: 500
        timeout-millis: 300
    external-simulator:
      mode: LOCAL
      max-trains: 20
      # еӨ–йғЁ segNo з”ұдҝЎеҸ·/иҪЁйҒ“е…ұеҗҢзЎ®и®ӨеҗҺеңЁжӯӨиҰҶзӣ–пјӣжңӘй…ҚзҪ®ж—¶дҪҝз”Ёзәҝи·Ҝж•°жҚ® rawSegmentId/еҢәж®өеәҸеҸ·гҖӮ
      segment-mapping: {}
      udp:
        model-host: 192.168.200.110
        model-port: 23001
        platform-host: 192.168.200.102
        platform-port: 23002
        timeout-millis: 60
      rt-lab:
        project-path: ""
        timeout-millis: 500
        stub-enabled: true
      shadow:
        speed-tolerance-meters-per-second: 0.5
        acceleration-tolerance-meters-per-second-squared: 0.3
        distance-tolerance-meters: 2.0
  dispatch:
    plan-location: classpath:config/dispatch-plan.yaml
    average-speed-ratio: 0.8
    dwell-tolerance-sec: 15
    departure-delay-sec: 30
    headway-shrink-ratio: 0.7
    headway-expand-ratio: 1.5
    crowding-load-rate: 0.8
    confirm-ticks: 3
    recover-ticks: 5
    recover-ratio: 0.3
    cooldown-sec: 60
    evaluate-interval-ms: 1000
    arrival-threshold-meters: 5
    stop-speed-threshold-mps: 0.5
    base-cruise-speed-mps: 15
    min-dwell-sec: 15
    max-dwell-sec: 60
    command-effect-timeout-sec: 180
    headway-effect-improvement-ratio: 0.25
    headway-effect-min-improvement-sec: 5
    route-request-timeout-seconds: 30
    route-established-hold-timeout-seconds: 120
    route-max-retries: 3
    route-waiting-priority-per-second: 0.05
    route-waiting-priority-max-bonus: 20
