server:
  port: 8080

spring:
  application:
    name: railway-sim-backend
  config:
    import:
      - optional:file:./application-local.yml
      - optional:file:./config/application-local.yml
      - optional:file:../config/application-local.yml
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:railway_sim}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:railway_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  jackson:
    time-zone: Asia/Shanghai

railway:
  simulation:
    tick-millis: 100
    push-interval-millis: 1000
    default-line-length-meters: 5000
    default-speed-limit-meters-per-second: 22.2
    default-curve-radius-meters: 1000
    safety-gap-meters: 120
    line-data-source: file
    line-id: "1"
    line-data-auto-import: false
    line-data-path: ../config/line-simple-demo.yaml
    power-config-path: ../config/power_third_rail.yaml
    fmu-step-millis: 100
    track-step-millis: 100
    signal-step-millis: 100
    power-step-millis: 100
    dispatch-step-millis: 1000
    persistence-step-millis: 5000
    stopping-control:
      zero-speed-meters-per-second: 0.2
      stable-seconds: 2
      success-tolerance-meters: 1.0
      overrun-threshold-meters: 1.0
      parameter-version: STOPPING_V1
    fmu-service-enabled: false
    fmu-service-url: http://localhost:9000
    fmu-service-timeout-millis: 500
    onboard-subsystem-mode: IN_PROCESS
    onboard-subsystem-url: http://localhost:9100
    onboard-subsystem-timeout-millis: 300
    onboard-subsystem-lease-millis: 1000
    vision:
      target-host: 18.32.115.28
      target-port: 8302
      local-port: 0
    vehicle-runtime:
      mode: LOCAL
      base-url: http://localhost:9300
      timeout-millis: 150
      auto-bootstrap: true
    external-power-network:
      mode: LOCAL
      base-url: http://localhost:9200
      timeout-millis: 300
      auto-bootstrap: true
    localnet:
      enabled: false
      audit-enabled: true
      recent-packet-limit: 20
      signal:
        enabled: false
        bind-host: 0.0.0.0
        bind-port: 0
        remote-host: 127.0.0.1
        remote-port: 0
        send-interval-millis: 100
        max-trains: 20
        shadow-comparison: true
      driver-cab:
        enabled: false
        reconnect-millis: 1000
        connections: []
      power-points:
        enabled: false
        point-table-path: ../config/power-point-table-example.yaml
        driver: LOCAL_SIM
        http-base-url: http://localhost:9200
        poll-interval-millis: 500
        timeout-millis: 300
    external-simulator:
      mode: LOCAL
      max-trains: 20
      # 外部 segNo 由信号/轨道共同确认后在此覆盖；未配置时使用线路数据 rawSegmentId/区段序号。
      segment-mapping: {}
      udp:
        model-host: 192.168.200.110
        model-port: 23001
        platform-host: 192.168.200.102
        platform-port: 23002
        timeout-millis: 60
      rt-lab:
        project-path: ""
        timeout-millis: 500
        stub-enabled: true
      shadow:
        speed-tolerance-meters-per-second: 0.5
        acceleration-tolerance-meters-per-second-squared: 0.3
        distance-tolerance-meters: 2.0
  dispatch:
    plan-location: classpath:config/dispatch-plan.yaml
    average-speed-ratio: 0.8
    dwell-tolerance-sec: 15
    departure-delay-sec: 30
    headway-shrink-ratio: 0.7
    headway-expand-ratio: 1.5
    crowding-load-rate: 0.8
    confirm-ticks: 3
    recover-ticks: 5
    recover-ratio: 0.3
    cooldown-sec: 60
    evaluate-interval-ms: 1000
    arrival-threshold-meters: 5
    stop-speed-threshold-mps: 0.5
    base-cruise-speed-mps: 15
    min-dwell-sec: 15
    max-dwell-sec: 60
