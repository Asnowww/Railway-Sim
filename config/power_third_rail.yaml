# 供电网络配置 — 从 线路数据(1).xls 实际轨道拓扑推导
#
# 线路拓扑（来自 xls）：
#   - 全 319 Seg 连通，总长 47,503m
#   - 主线段 0~16,049m：双线（上下行），15 组道岔渡线交叉连接
#   - 车辆段 16,049~47,503m：234 个 Seg 编组场配线网络
#   - 13 座车站（GGZ → GTG），每站 2 站台对应上下行
#
# 供电分区策略：
#   - 每段覆盖 3~4 站/约 3.6~4.5km
#   - 每段由一座牵引变电所供电，变电所置于段内主站
#   - 每段含上下行双接触轨，通过馈线分别供电
#   - 道岔渡线自然落于段内，不切割分区
#   - 车辆段独立分区（单端供电）

nominalVoltage: 1500
minimumVoltage: 1000
cutoffVoltage: 900
maxTractionCurrentAmps: 3000
overCurrentThresholdAmps: 3300
currentToVoltageDrop: 0.03

# ── 供电分区（5 个分区 x 上下行）────────────────────────
sections:
  - id: P01
    name: 西段-GGZ至KYL（上下行）
    substationId: SS01
    feederId: F01
    startMeters: 0
    endMeters: 4000
    substationVoltage: 1500
    energized: true
    breakerStatus: CLOSED
    isolatorStatus: CLOSED
    supplyMode: DOUBLE_END
    maintenanceState: NONE
    lockoutState: UNLOCKED
    resistanceOhmPerMeter: 0.00002

  - id: P02
    name: 中段-FTN至QLZ（上下行）
    substationId: SS02
    feederId: F02
    startMeters: 4000
    endMeters: 7500
    substationVoltage: 1500
    energized: true
    breakerStatus: CLOSED
    isolatorStatus: CLOSED
    supplyMode: DOUBLE_END
    maintenanceState: NONE
    lockoutState: UNLOCKED
    resistanceOhmPerMeter: 0.00002

  - id: P03
    name: 中北段-LLQ至BWR（上下行）
    substationId: SS03
    feederId: F03
    startMeters: 7500
    endMeters: 11000
    substationVoltage: 1500
    energized: true
    breakerStatus: CLOSED
    isolatorStatus: CLOSED
    supplyMode: DOUBLE_END
    maintenanceState: NONE
    lockoutState: UNLOCKED
    resistanceOhmPerMeter: 0.00002

  - id: P04
    name: 北段-JBG至GTG（上下行）
    substationId: SS04
    feederId: F04
    startMeters: 11000
    endMeters: 16600
    substationVoltage: 1500
    energized: true
    breakerStatus: CLOSED
    isolatorStatus: CLOSED
    supplyMode: DOUBLE_END
    maintenanceState: NONE
    lockoutState: UNLOCKED
    resistanceOhmPerMeter: 0.00002

  - id: P05
    name: 车辆段（配线网络）
    substationId: SS05
    feederId: F05
    startMeters: 16600
    endMeters: 47504
    substationVoltage: 1500
    energized: true
    breakerStatus: CLOSED
    isolatorStatus: CLOSED
    supplyMode: SINGLE_END
    maintenanceState: NONE
    lockoutState: UNLOCKED
    resistanceOhmPerMeter: 0.00003

# ── 牵引变电所（5 座，位置对应实际车站）─────────────────
substations:
  - id: SS01
    name: FSP（丰山坡）牵引变电所
    startMeters: 0
    endMeters: 4000
    supplyMode: DOUBLE_END
    available: true
    feederIds: [F01-UP, F01-DN]
    sectionIds: [P01]
    devices:
      - id: SS01-TR
        name: FSP牵引变压器
        deviceType: TRACTION_TRANSFORMER
        defaultState: AVAILABLE
        ratedVoltage: 35000
        ratedCurrentAmps: 2500
        locationMeters: 1661
        affectsSectionIds: [P01]
      - id: SS01-REC
        name: FSP整流器
        deviceType: RECTIFIER
        defaultState: AVAILABLE
        ratedVoltage: 1500
        ratedCurrentAmps: 3000
        locationMeters: 1665
        affectsSectionIds: [P01]
      - id: SS01-DCB
        name: FSP直流快速断路器
        deviceType: DC_BREAKER
        defaultState: CLOSED
        ratedVoltage: 1500
        ratedCurrentAmps: 3000
        locationMeters: 1670
        affectsSectionIds: [P01]

  - id: SS02
    name: FTD（富田东）牵引变电所
