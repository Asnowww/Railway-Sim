        defaultState: AVAILABLE
        ratedVoltage: 35000
        ratedCurrentAmps: 2500
        locationMeters: 9429
        affectsSectionIds: [P03]
      - id: SS03-REC
        name: LLE整流器
        deviceType: RECTIFIER
        defaultState: AVAILABLE
        ratedVoltage: 1500
        ratedCurrentAmps: 3000
        locationMeters: 9433
        affectsSectionIds: [P03]
      - id: SS03-DCB
        name: LLE直流快速断路器
        deviceType: DC_BREAKER
        defaultState: CLOSED
        ratedVoltage: 1500
        ratedCurrentAmps: 3000
        locationMeters: 9438
        affectsSectionIds: [P03]

  - id: SS04
    name: BDZ（北大张）牵引变电所
    startMeters: 11000
    endMeters: 16600
    supplyMode: DOUBLE_END
    available: true
    feederIds: [F04-UP, F04-DN]
    sectionIds: [P04]
    devices:
      - id: SS04-TR
        name: BDZ牵引变压器
        deviceType: TRACTION_TRANSFORMER
        defaultState: AVAILABLE
        ratedVoltage: 35000
        ratedCurrentAmps: 2500
        locationMeters: 13907
