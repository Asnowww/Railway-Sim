    startMeters: 7500
    endMeters: 11000
    supplyMode: DOUBLE_END
    available: true
    feederIds: [F03-UP, F03-DN]
    sectionIds: [P03]
    devices:
      - id: SS03-TR
        name: LLE牵引变压器
