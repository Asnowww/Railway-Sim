# ── 接触轨区段（5 段，上下行合并为一组）───────────────
# 注：每段内的上下行两条第三轨由同一变电所的不同馈线供电，
# 道岔渡线处的接触轨采用电气分段（绝缘节/中性段）。
thirdRailSections:
  - id: TRS01
    name: 西段接触轨（GGZ-KYL，上下行）
    powerSectionId: P01
    startMeters: 0
    endMeters: 4000
    isolatorIds: [ISO-P01-A, ISO-P01-B]
    returnCurrentDeviceId: RCD-P01

  - id: TRS02
    name: 中段接触轨（FTN-QLZ，上下行）
    powerSectionId: P02
    startMeters: 4000
    endMeters: 7500
    isolatorIds: [ISO-P02-A, ISO-P02-B]
    returnCurrentDeviceId: RCD-P02

  - id: TRS03
    name: 中北段接触轨（LLQ-BWR，上下行）
    powerSectionId: P03
    startMeters: 7500
    endMeters: 11000
    isolatorIds: [ISO-P03-A, ISO-P03-B]
    returnCurrentDeviceId: RCD-P03

  - id: TRS04
    name: 北段接触轨（JBG-GTG，上下行）
    powerSectionId: P04
    startMeters: 11000
    endMeters: 16600
    isolatorIds: [ISO-P04-A, ISO-P04-B]
    returnCurrentDeviceId: RCD-P04

  - id: TRS05
    name: 车辆段接触轨
    powerSectionId: P05
    startMeters: 16600
    endMeters: 47504
    isolatorIds: [ISO-P05-A, ISO-P05-B]
    returnCurrentDeviceId: RCD-P05

# ── 隔离开关（10 个，段边界/电分段处）─────────────────
# 注：实际现场在每个分段绝缘节处设隔离开关，
# 实现越区供电和检修隔离。此处仅列区段边界。
isolators:
  - id: ISO-P01-A
    name: 西段首端（上行起点）
    thirdRailSectionId: TRS01
    positionMeters: 0
    defaultState: CLOSED
    normallyOpen: false
  - id: ISO-P01-B
    name: 西段末端（KYL-FTN间）
    thirdRailSectionId: TRS01
    positionMeters: 4000
    defaultState: CLOSED
    normallyOpen: false

  - id: ISO-P02-A
    name: 中段首端（KYL-FTN间）
    thirdRailSectionId: TRS02
    positionMeters: 4000
    defaultState: CLOSED
    normallyOpen: false
  - id: ISO-P02-B
    name: 中段末端（QLZ-LLQ间）
    thirdRailSectionId: TRS02
    positionMeters: 7500
    defaultState: CLOSED
    normallyOpen: false

  - id: ISO-P03-A
    name: 中北段首端（QLZ-LLQ间）
    thirdRailSectionId: TRS03
    positionMeters: 7500
    defaultState: CLOSED
    normallyOpen: false
  - id: ISO-P03-B
    name: 中北段末端（BWR-JBG间）
    thirdRailSectionId: TRS03
    positionMeters: 11000
    defaultState: CLOSED
    normallyOpen: false

  - id: ISO-P04-A
    name: 北段首端（BWR-JBG间）
    thirdRailSectionId: TRS04
    positionMeters: 11000
    defaultState: CLOSED
    normallyOpen: false
  - id: ISO-P04-B
    name: 北段末端（车挡处）
    thirdRailSectionId: TRS04
    positionMeters: 16600
    defaultState: CLOSED
    normallyOpen: false

  - id: ISO-P05-A
    name: 车辆段入口隔离开关
    thirdRailSectionId: TRS05
    positionMeters: 16600
    defaultState: CLOSED
    normallyOpen: false
  - id: ISO-P05-B
    name: 车辆段末端隔离开关
    thirdRailSectionId: TRS05
    positionMeters: 47503
    defaultState: CLOSED
    normallyOpen: false

# ── 排流柜（5 个）──────────────────────────────────────
returnCurrentDevices:
  - id: RCD-P01
    name: 西段排流柜（FSP）
    sectionId: P01
    deviceType: DRAINAGE_CABINET
    defaultState: NORMAL
  - id: RCD-P02
    name: 中段排流柜（FTD）
    sectionId: P02
    deviceType: DRAINAGE_CABINET
    defaultState: NORMAL
  - id: RCD-P03
    name: 中北段排流柜（LLE）
    sectionId: P03
    deviceType: DRAINAGE_CABINET
    defaultState: NORMAL
  - id: RCD-P04
    name: 北段排流柜（BDZ）
    sectionId: P04
    deviceType: DRAINAGE_CABINET
    defaultState: NORMAL
  - id: RCD-P05
    name: 车辆段排流柜
    sectionId: P05
    deviceType: DRAINAGE_CABINET
    defaultState: NORMAL

# ── 杂散电流监测点（5 个）──────────────────────────────
strayCurrentMonitorPoints:
  - id: SCP-P01
    name: 西段极化电位监测点（KYL附近）
    sectionId: P01
    positionMeters: 2000
    returnCurrentDeviceId: RCD-P01
    normalMinPotentialVolts: -0.8
    normalMaxPotentialVolts: 1.8
  - id: SCP-P02
    name: 中段极化电位监测点（FTD附近）
    sectionId: P02
    positionMeters: 5500
    returnCurrentDeviceId: RCD-P02
    normalMinPotentialVolts: -0.8
    normalMaxPotentialVolts: 1.8
  - id: SCP-P03
    name: 中北段极化电位监测点（JBG附近）
    sectionId: P03
    positionMeters: 10000
    returnCurrentDeviceId: RCD-P03
    normalMinPotentialVolts: -0.8
    normalMaxPotentialVolts: 1.8
  - id: SCP-P04
    name: 北段极化电位监测点（GTG附近）
    sectionId: P04
    positionMeters: 15000
    returnCurrentDeviceId: RCD-P04
    normalMinPotentialVolts: -0.8
    normalMaxPotentialVolts: 1.8
  - id: SCP-P05
    name: 车辆段极化电位监测点
    sectionId: P05
    positionMeters: 32050
    returnCurrentDeviceId: RCD-P05
    normalMinPotentialVolts: -0.8
    normalMaxPotentialVolts: 1.8

# ── 再生制动策略────────────────────────────────────────
regeneration:
  sameSectionAbsorbFirst: true
  unabsorbedMode: BRAKE_RESISTOR
