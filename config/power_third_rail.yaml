      - id: SS02-REC
        name: FTD整流器
        deviceType: RECTIFIER
        defaultState: AVAILABLE
        ratedVoltage: 1500
        ratedCurrentAmps: 3000
        locationMeters: 5018
        affectsSectionIds: [P02]
      - id: SS02-DCB
        name: FTD直流快速断路器
        deviceType: DC_BREAKER
        defaultState: CLOSED
        ratedVoltage: 1500
        ratedCurrentAmps: 3000
        locationMeters: 5023
