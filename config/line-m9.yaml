# 北京地铁9号线（郭公庄—国家图书馆）真实线路数据 — 环线里程（loop-km）版
# 数据源自《视景系统公里标最新数据+站台位置20260703.xlsx》（scripts/convert_m9_xlsx.py），
# down 侧由 scripts/fold_m9_loop.py 换算生成，勿手改数值。
#
# 环线里程约定（引擎只支持里程递增行驶，双线折叠成一条 0→2L 的单调里程轴）：
#   - up 股道：loop_km = geo_km，范围 [0, L]，L=16489.02（郭公庄=0 → 国图=L）
#   - down 股道：loop_km = 2L - geo_km，范围 [L, 2L]（国图=L → 郭公庄=2L=32978.04）
#   - down 行车方向（国图→郭公庄）= loop_km 递增；D47 为下行第一段，D03 为最后一段
#   - 中间站拆为两个点：S1xx=up 侧，S2xx=down 侧（同名车站，前端折叠后只显示一个站名）
#   - 前端 LineDiagram 将 loop_km > L 的部分折叠回顶部车道（显示 geo = 2L - loop_km）
# 上行 24 段 / 下行 23 段 / 上行 13 站 + 下行 13 站
# 约定：track=up 对应 Track1/上行视景边表；track=down 对应 Track0/下行视景边表
# raw_segment_id = 视景系统 UDP 边号（segNo）；视景对接时 down 段需换算回 geo_km

