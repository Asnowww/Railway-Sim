model: RailwaySimVehicle.TrainTractionBrake
modelVersion: TrainTractionBrake/1.0.0
fmiVersion: "2.0"
fmuType: CoSimulation

service:
  protocol: HTTP_JSON
  baseUrl: http://localhost:9000
  stepFleetPath: /step-fleet

# FMU 初始化模式内从 config/train_params.yaml 写入的固定参数。
parameters:
  maxMechanicalTractionPowerWatts:
    fmiVariable: maxMechanicalTractionPowerWatts
    type: Real
    unit: W
    source: traction.maxPowerWatts
  maxTractionForceNewtons:
    fmiVariable: maxTractionForceNewtons
    type: Real
    unit: N
    source: traction.maxTractionForceNewtons
  tractionEfficiency:
    fmiVariable: tractionEfficiency
    type: Real
    unit: "1"
    source: traction.efficiency
  maxServiceBrakeForceNewtons:
    fmiVariable: maxServiceBrakeForceNewtons
    type: Real
    unit: N
    source: brake.maxServiceBrakeForceNewtons
  maxEmergencyBrakeForceNewtons:
    fmiVariable: maxEmergencyBrakeForceNewtons
    type: Real
    unit: N
    source: brake.maxEmergencyBrakeForceNewtons
  regenBrakeRatio:
    fmiVariable: regenBrakeRatio
    type: Real
    unit: "1"
    source: brake.regenBrakeRatio
  regenEfficiency:
    fmiVariable: regenEfficiency
    type: Real
    unit: "1"
    source: brake.regenEfficiency
  davisA:
    fmiVariable: davisA
    type: Real
    unit: N
    source: resistance.davisA
  davisB:
    fmiVariable: davisB
    type: Real
    unit: N.s/m
    source: resistance.davisB
  davisC:
    fmiVariable: davisC
    type: Real
    unit: N.s2/m2
    source: resistance.davisC
  minimumVoltageVolts:
    fmiVariable: minimumVoltageVolts
    type: Real
    unit: V
    source: power.minVoltage
  cutoffVoltageVolts:
    fmiVariable: cutoffVoltageVolts
    type: Real
    unit: V
    source: power.cutoffVoltage

# 只在 INIT、RESET 或 RESYNC 的初始化模式内写入。
initialState:
  positionMeters:
    fmiVariable: initialPositionMeters
    type: Real
    unit: m
  speedMetersPerSecond:
    fmiVariable: initialSpeedMetersPerSecond
    type: Real
    unit: m/s
  previousEnergyConsumedKwh:
    fmiVariable: initialEnergyConsumedKwh
    type: Real
    unit: kWh
  previousEnergyRegeneratedKwh:
    fmiVariable: initialEnergyRegeneratedKwh
    type: Real
    unit: kWh

# 每个 100 ms doStep 前写入；stepSizeSeconds 本身作为 doStep 参数。
stepInputs:
  trainMassKg:
    fmiVariable: trainMassKg
    type: Real
    unit: kg
    source: 9300.VehicleLoadPolicy.totalMassKg
  tractionCommand:
    fmiVariable: tractionCommand
    type: Real
    unit: "1"
    source: 9300.VehicleControlQueue
  brakeCommand:
    fmiVariable: brakeCommand
    type: Real
    unit: "1"
    source: 9300.VehicleControlQueue
  emergencyBrakeCommand:
    fmiVariable: emergencyBrakeCommand
    type: Boolean
    source: 9300.VehicleControlQueue
  doorClosed:
    fmiVariable: doorClosed
    type: Boolean
    source: 9300.TCMS
  gradient:
    fmiVariable: gradient
    type: Real
    unit: "1"
    source: 9300.TrackConstraint
  railVoltage:
    fmiVariable: lineVoltageVolts
    type: Real
    unit: V
    source: 9200.PowerConstraintSnapshot
  powerAvailableWatts:
    fmiVariable: powerAvailableWatts
    type: Real
    unit: W
    source: 9200.PowerConstraintSnapshot
  regenPowerAvailableWatts:
    fmiVariable: regenPowerAvailableWatts
    type: Real
    unit: W
    source: 9200.PowerConstraintSnapshot
  currentCollectionAvailable:
    fmiVariable: currentCollectionAvailable
    type: Boolean
    source: 9200.PowerConstraintSnapshot
  adhesionCoefficient:
    fmiVariable: adhesionCoefficient
    type: Real
    unit: "1"
    source: 9300.environment

# 只参与实例路由、追踪和诊断，不写入 FMU 物理变量。
metadata:
  trainId:
    purpose: instance-key
  lifecycleCommand:
    allowedValues: [INIT, STEP, RESET, RESYNC]
  sectionId:
    purpose: power-section-trace
  speedLimitMetersPerSecond:
    unit: m/s
    owner: 9300-control
  movementAuthorityDistanceMeters:
    unit: m
    owner: 9300-control
  stationDistanceMeters:
    unit: m
    owner: 9300-control
  stoppingDistanceMeters:
    unit: m
    owner: 9300-control
  dynamicsState:
    owner: 9300-control
  dynamicsConstraintReason:
    owner: 9300-control
  curveRadiusMeters:
    unit: m
    owner: 9300-track-metadata

outputs:
  newPositionMeters:
    fmiVariable: positionMeters
    type: Real
    unit: m
    consumer: 9300-state
  newSpeedMetersPerSecond:
    fmiVariable: speedMetersPerSecond
    type: Real
    unit: m/s
    consumer: 9300-control
  accelerationMetersPerSecondSquared:
    fmiVariable: accelerationMetersPerSecondSquared
    type: Real
    unit: m/s2
    consumer: 9300-report
  tractionForceNewtons:
    fmiVariable: tractionForceNewtons
    type: Real
    unit: N
    consumer: 9300-report
  brakeForceNewtons:
    fmiVariable: brakeForceNewtons
    type: Real
    unit: N
    consumer: 9300-report
  regenBrakeForceNewtons:
    fmiVariable: regenBrakeForceNewtons
    type: Real
    unit: N
    consumer: 9300-report
  mechanicalTractionPowerWatts:
    fmiVariable: mechanicalTractionPowerWatts
    type: Real
    unit: W
    consumer: 9300-diagnostics
  tractionPowerWatts:
    fmiVariable: tractionPowerWatts
    type: Real
    unit: W
    powerSide: grid
    consumer: 9200-load
  railCurrentAmps:
    fmiVariable: railCurrentAmps
    type: Real
    unit: A
    consumer: 9200-load
  mechanicalRegenPowerWatts:
    fmiVariable: mechanicalRegenPowerWatts
    type: Real
    unit: W
    consumer: 9300-diagnostics
  regenPowerWatts:
    fmiVariable: regenPowerWatts
    type: Real
    unit: W
    powerSide: grid
    consumer: 9200-load
  energyConsumedKwh:
    fmiVariable: energyConsumedKwh
    type: Real
    unit: kWh
    consumer: 9300-state
  energyRegeneratedKwh:
    fmiVariable: energyRegeneratedKwh
    type: Real
    unit: kWh
    consumer: 9300-state
  faultCode:
    fmiVariable: faultCodeValue
    type: Integer
    mappingOwner: 9000
