server:
  port: 9300

spring:
  application:
    name: vehicle-runtime-service

vehicle-runtime:
  stopping-control:
    service-brake-deceleration-meters-per-second-squared: 0.9
    station-stop-window-meters: 10.0
    minimum-approach-buffer-meters: 30.0
    maximum-approach-buffer-meters: 140.0
    approach-buffer-seconds: 6.0
    minimum-effective-deceleration-meters-per-second-squared: 0.35
    maximum-effective-deceleration-meters-per-second-squared: 1.25
    zero-speed-meters-per-second: 0.2
    parameter-version: STOPPING_V1
  train-params-path: config/train_params.yaml
  queue-capacity: 1
  default-line-length-meters: 5000
  default-speed-limit-meters-per-second: 22.2
  safety-gap-meters: 120
  instance-lease-millis: 1000
  physics-mode: JAVA_FALLBACK
  fmu-base-url: http://localhost:9000
  fmu-timeout-millis: 80
  fmu-substep-millis: 20
  fmu-model-version: TrainTractionBrake/2.0.0
  forward-power-loads: false
  power-network-base-url: http://localhost:9200
  power-network-timeout-millis: 300
  central-base-url: http://localhost:8080
  central-timeout-millis: 300
  telemetry-timeout-millis: 500
  telemetry-maximum-age-millis: 500
